<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFE - Asociación Futsal Esquel</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --naranja-afe: #ff8c00; /* Color de la barra del afiche */
            --blanco: #ffffff;
            --gris-fondo: #f4f4f4;
            --negro: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background-color: var(--gris-fondo);
            color: var(--negro);
        }

        /* --- HEADER --- */
        header {
            background: var(--blanco);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        header h1 {
            margin: 0;
            color: var(--naranja-afe);
            text-transform: uppercase;
            font-size: 1.8rem;
        }

        /* --- BARRA DE PESTAÑAS (CATEGORÍAS) --- */
        nav.categorias-nav {
            background: var(--blanco);
            border-bottom: 4px solid var(--naranja-afe);
            position: sticky;
            top: 0;
            z-index: 1000;
            overflow-x: auto; /* Para que en celular se deslice de costado */
            white-space: nowrap;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 15px 20px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn:hover { color: var(--naranja-afe); }

        .tab-btn.active {
            color: var(--naranja-afe);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--naranja-afe);
        }

        /* --- CONTENIDO --- */
        .container {
            max-width: 1200px;
            margin: 25px auto;
            padding: 0 15px;
        }

        .grid-equipos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Tarjeta Estilo TecnoStore */
        .card {
            background: var(--blanco);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        .img-box {
            aspect-ratio: 1/1;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info { padding: 12px; border-top: 1px solid #f0f0f0; background: #fafafa; }

        .nombre-equipo { font-weight: 800; font-size: 0.9rem; text-transform: uppercase; }

        #loader { text-align: center; padding: 50px; font-weight: bold; color: var(--naranja-afe); }

        @media (max-width: 480px) {
            nav.categorias-nav { justify-content: flex-start; }
            .grid-equipos { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AFE ESQUEL</h1>
        <p>Asociación Futsal Esquel</p>
    </header>

    <nav class="categorias-nav">
        <button class="tab-btn active" onclick="filtrar('TODOS')">TODOS</button>
        <button class="tab-btn" onclick="filtrar('HONOR')">HONOR</button>
        <button class="tab-btn" onclick="filtrar('DIVISION A')">DIVISIÓN A</button>
        <button class="tab-btn" onclick="filtrar('DIVISION B')">DIVISIÓN B</button>
        <button class="tab-btn" onclick="filtrar('DIVISION C')">DIVISIÓN C</button>
        <button class="tab-btn" onclick="filtrar('FEMENINO')">FEMENINO</button>
    </nav>

    <div class="container">
        <div id="loader">Cargando equipos...</div>
        <div class="grid-equipos" id="lista-equipos"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zycbdurfowmflttkrxaf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6O7PzB02VgmvuRc2pmz8UA_wferbeGH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosEquipos = [];

        async function cargarDatos() {
            const { data, error } = await _supabase
                .from('equipos')
                .select('*')
                .order('nombre', { ascending: true });

            if (error) {
                console.error(error);
                return;
            }

            todosLosEquipos = data;
            mostrarEquipos(todosLosEquipos);
            document.getElementById('loader').style.display = 'none';
        }

        function mostrarEquipos(lista) {
            const container = document.getElementById('lista-equipos');
            container.innerHTML = ''; // Limpiar pantalla

            lista.forEach(equipo => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-box">
                        <img src="${equipo.escudo_url || 'https://via.placeholder.com/150?text=AFE'}" alt="${equipo.nombre}">
                    </div>
                    <div class="info">
                        <span class="nombre-equipo">${equipo.nombre}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrar(categoria) {
            // Cambiar estado visual de las pestañas
            const botones = document.querySelectorAll('.tab-btn');
            botones.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Filtrar lógica
            if (categoria === 'TODOS') {
                mostrarEquipos(todosLosEquipos);
            } else {
                const filtrados = todosLosEquipos.filter(e => e.categoria === categoria);
                mostrarEquipos(filtrados);
            }
        }

        document.addEventListener('DOMContentLoaded', cargarDatos);
    </script>
</body>
</html>
